database:
  path: ./data/outlook-knowledge.db
entra:
  tenant_id: ${OUTLOOK_TENANT_ID}
  client_id: ${OUTLOOK_CLIENT_ID}
mail:
  include_received: true
  include_sent: true
  addresses:
    - address: you@example.com
      name: 本人
      enabled: true
    - address: project-ml@example.com
      name: プロジェクトML
      enabled: true
      match:
        headers: [To, Cc, Delivered-To, X-Original-To, Envelope-To, X-Envelope-To]
        subject_prefixes: ["[project-ml]"]
  folders:
    include: [inbox, sentitems, archive]
    exclude: [deleteditems, junkemail, drafts, outbox]
calendar:
  display_timezone: Asia/Tokyo
  range:
    past_days: 1095
    future_days: 365
  calendars:
    - id: primary
      enabled: true
  private_events:
    store_details: false
    expose_to_mcp: false
  sync_windows:
    recent_months_per_window: 1
    historical_months_per_window: 3
    future_months_per_window: 3
sync:
  interval: 5m
  mail_initial_lookback_days: 365
  full_resync_interval: 168h
  request_timeout: 30s
  max_retries: 5
logging:
  level: info
  format: json
