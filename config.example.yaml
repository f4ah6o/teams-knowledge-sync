database:
  path: ./data/teams-knowledge.db
entra:
  tenant_id: ${TEAMS_TENANT_ID}
  client_id: ${TEAMS_CLIENT_ID}
sync:
  initial_lookback_days: 365
  overlap_duration: 24h
  full_resync_interval: 24h
  request_timeout: 30s
  max_retries: 5
  concurrency: 4
notifications:
  listen_address: 127.0.0.1:8787
  public_url: https://teams-knowledge.obr-grp.com/graph/notifications
teams: []
chats:
  include_my_chats: true
  include_one_on_one: true
  include_group: true
  include_meeting: true
  exclude_ids: []
search:
  engine: kagome_fts5
logging:
  level: info
  format: json
